<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal App</title>
  <link rel="stylesheet" href="styles/app.css" />
  <link rel="stylesheet" href="styles/notifications.css" />
</head>

<body>
  <div class="fireworks-layer" id="fireworksLayer" aria-hidden="true"></div>

  <main class="shell" aria-live="polite">
    <div class="topline">
      <div>
        <div class="label">Signal</div>
        <div class="range" id="windowLabel">Today</div>
      </div>
      <div class="top-controls">
        <button class="warning-button" id="afterHoursButton" type="button" aria-label="After-hours notice" title="After-hours notice" hidden>
          !
        </button>
        <div class="status" id="status">Loading</div>
        <details class="settings" id="settingsMenu">
          <summary class="settings-toggle" aria-label="Settings" title="Settings">
            <svg class="settings-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <span class="visually-hidden">Settings</span>
          </summary>
          <div class="settings-panel">
            <div class="setting-row">
              <label class="setting-label" for="effectSelect">Neon</label>
              <select class="setting-select" id="effectSelect" aria-label="Number effect">
                <option value="prism">Glass prism</option>
                <option value="rolling">Rolling RGB</option>
                <option value="aurora">Aurora ink</option>
                <option value="pulse">Soft pulse</option>
                <option value="scanner">Laser scan</option>
              </select>
            </div>

            <div class="setting-row">
              <label class="setting-label" for="arcEndDaySelect">Week window</label>
              <select class="setting-select" id="arcEndDaySelect" aria-label="Week tracking window">
                <option value="0">Mon only</option>
                <option value="1">Mon-Tue</option>
                <option value="2">Mon-Wed</option>
                <option value="3">Mon-Thu</option>
                <option value="4">Mon-Fri</option>
                <option value="5">Mon-Sat</option>
                <option value="6">Mon-Sun</option>
              </select>
            </div>

            <section class="schedule-settings" aria-label="Weekly schedule">
              <div class="setting-label">Schedule</div>
              <div class="schedule-grid">
                <button class="schedule-button" type="button" data-schedule-day="0" aria-label="Monday schedule">
                  <span class="schedule-day-name">Mon</span>
                  <span class="schedule-day-state">Work</span>
                </button>
                <button class="schedule-button" type="button" data-schedule-day="1" aria-label="Tuesday schedule">
                  <span class="schedule-day-name">Tue</span>
                  <span class="schedule-day-state">Work</span>
                </button>
                <button class="schedule-button" type="button" data-schedule-day="2" aria-label="Wednesday schedule">
                  <span class="schedule-day-name">Wed</span>
                  <span class="schedule-day-state">Work</span>
                </button>
                <button class="schedule-button" type="button" data-schedule-day="3" aria-label="Thursday schedule">
                  <span class="schedule-day-name">Thu</span>
                  <span class="schedule-day-state">Work</span>
                </button>
                <button class="schedule-button" type="button" data-schedule-day="4" aria-label="Friday schedule">
                  <span class="schedule-day-name">Fri</span>
                  <span class="schedule-day-state">Work</span>
                </button>
                <button class="schedule-button" type="button" data-schedule-day="5" aria-label="Saturday schedule">
                  <span class="schedule-day-name">Sat</span>
                  <span class="schedule-day-state">Work</span>
                </button>
                <button class="schedule-button" type="button" data-schedule-day="6" aria-label="Sunday schedule">
                  <span class="schedule-day-name">Sun</span>
                  <span class="schedule-day-state">Work</span>
                </button>
              </div>
            </section>

            <section class="facts" aria-label="Timing details">
              <div class="fact">
                <div class="fact-label">Now</div>
                <div class="fact-value" id="currentTime">--:--:--</div>
              </div>
              <div class="fact">
                <div class="fact-label">Elapsed</div>
                <div class="fact-value" id="elapsedTime">--</div>
              </div>
              <div class="fact">
                <div class="fact-label">Left</div>
                <div class="fact-value" id="remainingTime">--</div>
              </div>
            </section>
          </div>
        </details>
      </div>
    </div>

    <div class="tabs" role="tablist" aria-label="Progress range">
      <button class="tab-button" type="button" role="tab" aria-selected="true" data-mode="day">Today</button>
      <button class="tab-button" type="button" role="tab" aria-selected="false" data-mode="arc">Mon-Thu</button>
    </div>

    <section aria-label="Progress meter">
      <div class="readout">
        <span class="number" id="percentNumber">00.00000</span>
        <span class="symbol">%</span>
      </div>

      <div class="track" aria-hidden="true">
        <div class="fill" id="progressFill"></div>
      </div>

      <div class="flavor" id="flavorText">Ignition check.</div>
      <div class="after-hours-notice" id="afterHoursNotice" hidden></div>

      <div class="payday-strip" aria-label="Payday countdown">
        <div class="payday-copy">
          <div class="payday-label">Payday</div>
          <div class="payday-date" id="paydayDate">24th</div>
        </div>
        <div class="payday-counter" id="paydayCounter">--</div>
      </div>
    </section>

  </main>

  <div class="notice-modal" id="noticeModal" role="dialog" aria-modal="true" aria-labelledby="noticeTitle" aria-describedby="noticeMessage" hidden>
    <div class="notice-backdrop" data-notice-close></div>
    <div class="notice-panel">
      <div class="notice-mark" id="noticeMark">!</div>
      <div class="notice-content">
        <h2 class="notice-title" id="noticeTitle">Notice</h2>
        <p class="notice-message" id="noticeMessage"></p>
        <div class="notice-actions">
          <button class="notice-button notice-button-secondary" id="noticeCancelButton" type="button">Cancel</button>
          <button class="notice-button notice-button-primary" id="noticeConfirmButton" type="button">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script src="scripts/notifications.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
